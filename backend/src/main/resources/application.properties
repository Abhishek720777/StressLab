spring.application.name=stresslab

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stresslab_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
